<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title><# Project.Namespace#></title>
	<base href="/" />
	<link rel="preload" id="webassembly" />
	<link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
	<link href="css/site.css" rel="stylesheet" />
	<link href="<#cs Write(Project.Namespace)#>.Blazor.styles.css" rel="stylesheet" />
	<link rel="icon" type="image/png" href="favicon.png" />
	<script type="importmap"></script>
	<script>
		globalThis.temgenBlazorStorage = {
			get(key) {
				try {
					return globalThis.localStorage.getItem(key);
				}
				catch (error) {
					return null;
				}
			},
			set(key, value) {
				try {
					globalThis.localStorage.setItem(key, value);
				}
				catch (error) {
				}
			},
			remove(key) {
				try {
					globalThis.localStorage.removeItem(key);
				}
				catch (error) {
				}
			}
		};

		globalThis.themePreference = {
			storageKey: "theme-preference",
			defaultTheme: "dark",
			getStoredTheme() {
				try {
					const theme = globalThis.localStorage.getItem(this.storageKey);
					return theme === "light" || theme === "dark" ? theme : null;
				}
				catch (error) {
					return null;
				}
			},
			getTheme() {
				return this.getStoredTheme() || this.defaultTheme;
			},
			setTheme(theme) {
				const resolvedTheme = theme === "light" ? "light" : "dark";
				document.documentElement.setAttribute("data-app-theme", resolvedTheme);
				document.documentElement.style.colorScheme = resolvedTheme;
				try {
					globalThis.localStorage.setItem(this.storageKey, resolvedTheme);
				}
				catch (error) {
				}
				return resolvedTheme;
			},
			toggleTheme() {
				return this.setTheme(this.getTheme() === "dark" ? "light" : "dark");
			}
		};

		globalThis.themePreference.setTheme(globalThis.themePreference.getTheme());
	</script>
</head>

<body>
	<div id="app">
		<div class="app-loading-shell">
			<div class="app-loading-panel" role="status" aria-live="polite">
				<div class="app-loading-eyebrow"><# Project.Namespace#></div>
				<svg class="loading-progress" viewBox="0 0 100 100" aria-hidden="true">
					<circle cx="50" cy="50" r="42" pathLength="100" />
					<circle cx="50" cy="50" r="42" pathLength="100" />
				</svg>
				<div class="loading-progress-text"></div>
				<p class="app-loading-copy">Preparing the client and downloading the required files.</p>
			</div>
		</div>
	</div>

	<div id="blazor-error-ui">
		An unhandled exception has occurred. See browser dev tools for details.
		<a href="." class="reload">Reload</a>
		<span class="dismiss">🗙</span>
	</div>

	<script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
	<script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>
</html>
<#cs SetOutputPathAndSkipOtherDefinitions()#>
